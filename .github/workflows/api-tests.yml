name: API Tests

on:
  push:
    branches: [ main ]

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Show project structure (DEBUG)
        run: ls -R

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18


      - name: Debug collections file (CAT)
        run: cat collections/Restful_Booker_Collection.postman_collection.json

      - name: Debug environment file (CAT)
        run: cat environments/environment.postman_environment.json


      - name: Install Newman
        run: npm install -g newman

      - name: Run Newman tests
        run: |
          newman run collections/Restful_Booker_Collection.postman_collection.json \
          -e environments/environment.postman_environment.json \
          -r cli